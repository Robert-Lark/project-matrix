<!--
  Canonical font-loading markup (ADR-0003 §8) — every consumer of the design
  system (reference render, chrome/HUD, variants) loads the fonts with exactly
  this shape: preloads for the first-paint files, then the @font-face
  stylesheet. Only the base path may differ per consumer (each resolves the
  @pm/tokens package its own way); everything else is copied verbatim so font
  delivery stays a controlled constant across variants.

  Exception (verify-slice, 2026-07-17): a surface that renders NO crate
  text (home — off the store matrix, ADR-0007 §6's own delivery-deviation
  precedent) omits the PM Crate Symbols preload; a preload the font-matching
  never uses is a dead download. Store surfaces keep both lines verbatim.

  Note: `crossorigin` is required on font preloads even same-origin — fonts are
  fetched in CORS mode; without it the preload is re-fetched and wasted.

  PMCrateSymbols is preloaded because ⅓ (U+2153) is first-paint content on the
  PLP card meta line ("33 ⅓ RPM") — a late symbol swap there is a layout-shift
  risk, and the file is a 3.8 KB constant. PMWarnGlyph is deliberately NOT
  preloaded: it is an error-state-only glyph (the field ⚠), never first-paint.
-->
<link rel="preload" href="./node_modules/@pm/tokens/fonts/FamiljenGrotesk.var.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="./node_modules/@pm/tokens/fonts/PMCrateSymbols.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="./node_modules/@pm/tokens/css/fonts.css">
