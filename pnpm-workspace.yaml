# The one-SHA monorepo (ADR-0004 §2): variants, shared packages, workers, tools.
# docs/ is planning material, not a workspace.
packages:
  - "variants/*"
  - "packages/*"
  - "workers/*"
  - "tools/*"

# Dependency build scripts are gated (pnpm ≥11 supply-chain default); these
# three are wrangler's own toolchain (bundler, image codec, the local Workers
# runtime) and are required for `wrangler dev`/`deploy`.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

# @opennextjs/cloudflare's bundler step imports esbuild directly but does not
# declare it as a dependency (relies on it being hoisted, which the
# no-hoisting isolation below deliberately prevents) — editorial-build slice
# B (react-next).
packageExtensions:
  "@opennextjs/cloudflare":
    dependencies:
      esbuild: "^0.25.4"

# Zero-bias dependency isolation (ADR-0004 §2): no hoisting at all, not even
# pnpm's hidden virtual-store hoist (node_modules/.pnpm/node_modules) — a
# workspace can resolve only what it declares, even through tooling that
# exports NODE_PATH (vitest does). pnpm ≥10 reads this here, NOT from .npmrc.
# Proven by tools/repo-checks/test/workspace-isolation.test.ts.
hoist: false

minimumReleaseAgeExclude:
  - miniflare@4.20260708.1
  - wrangler@4.110.0
