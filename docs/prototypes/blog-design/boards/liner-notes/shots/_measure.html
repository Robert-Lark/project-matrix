<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400&display=swap" rel="stylesheet">
<style>body{font-family:'Source Serif 4',serif;font-size:19px}</style></head>
<body><div id="s" style="width:41rem"></div><div id="out"></div>
<script>
document.fonts.ready.then(()=>{
  const d=document.createElement('span');d.textContent='0'.repeat(100);document.body.appendChild(d);
  const chpx=d.getBoundingClientRect().width/100;
  const col=document.getElementById('s').getBoundingClientRect().width;
  document.getElementById('out').textContent='RESULT ch='+chpx.toFixed(3)+'px column=656px measure='+(col/chpx).toFixed(1)+'ch';
});
</script></body></html>
