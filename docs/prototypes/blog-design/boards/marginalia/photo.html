      <header class="post-head post-head--photo">
        <h1>Powell Butte, before the fog lifted</h1>
        <p class="post-meta"><time datetime="2026-06-21">June 21, 2026</time></p>
      </header>
      <div class="post-body">
        <p>Up before the dog, for once. Portra 400, the 50mm, and about forty minutes when the butte belonged to nobody.</p>
